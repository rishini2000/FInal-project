<!DOCTYPE html>
<html lang="en" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{header :: headerFragment}"></head>
<body>
    <div class="app-layout">
        <aside class="sidebar d-none d-lg-flex" th:replace="~{layout :: sidebarFragment}"></aside>
        <div th:replace="~{layout :: sidebarOffcanvasFragment}"></div>
        <div class="main-content">
            <header th:replace="~{layout :: topbarFragment('Credit Report')}"></header>
            <div class="content-wrapper">
                <div class="card mb-3">
                    <div class="card-header title">
                        <div class="row align-items-center">
                            <div class="col text-start">
                                <h2 class="table-title"><i class="fa-solid fa-credit-card me-2"></i>Credit Report</h2>
                            </div>
                            <div class="col text-end header-actions">
                                <button type="button" class="btn btn-outline-secondary" onclick="printReport()"><i class="fa-solid fa-print me-1"></i>Print</button>
                                <button type="button" class="btn btn-outline-success" onclick="exportCSV()"><i class="fa-solid fa-download me-1"></i>Export CSV</button>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Summary Cards -->
                <div class="row mb-3" id="summaryCards">
                    <div class="col-md-3"><div class="card"><div class="card-body text-center"><h6 class="text-muted">Total Customers</h6><h3 id="totalCustomers">0</h3></div></div></div>
                    <div class="col-md-3"><div class="card"><div class="card-body text-center"><h6 class="text-muted">Total Credit</h6><h3 id="totalCredit">Rs. 0</h3></div></div></div>
                    <div class="col-md-3"><div class="card"><div class="card-body text-center"><h6 class="text-muted">Avg Credit</h6><h3 id="avgCredit">Rs. 0</h3></div></div></div>
                    <div class="col-md-3"><div class="card"><div class="card-body text-center"><h6 class="text-muted">Total Appointments</h6><h3 id="totalAppointments">0</h3></div></div></div>
                </div>

                <!-- Data Table -->
                <div class="row m-2">
                    <div class="col-12">
                        <div class="card">
                            <div class="card-body">
                                <table class="modern-table">
                                    <thead>
                                        <tr>
                                            <th>#</th>
                                            <th>Customer</th>
                                            <th>Mobile</th>
                                            <th>Total Credit (Rs.)</th>
                                            <th>Last Payment Date</th>
                                            <th>Appointment Count</th>
                                            <th>Action</th>
                                        </tr>
                                    </thead>
                                    <tbody id="tableBodyCredit" class="tablebody"></tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <div th:replace="~{footer :: footerFragment}"></div>
    <script src="/js/report_credit.js"></script>
</body>
</html>
