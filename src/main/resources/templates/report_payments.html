<!DOCTYPE html>
<html lang="en" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{header :: headerFragment}"></head>
<body>
    <div class="app-layout">
        <aside class="sidebar d-none d-lg-flex" th:replace="~{layout :: sidebarFragment}"></aside>
        <div th:replace="~{layout :: sidebarOffcanvasFragment}"></div>
        <div class="main-content">
            <header th:replace="~{layout :: topbarFragment('Payment Report')}"></header>
            <div class="content-wrapper">
                <div class="card mb-3">
                    <div class="card-header title">
                        <div class="row align-items-center">
                            <div class="col text-start">
                                <h2 class="table-title"><i class="fa-solid fa-money-bill-wave me-2"></i>Payment Report</h2>
                            </div>
                            <div class="col text-end header-actions">
                                <button type="button" class="btn btn-outline-secondary" onclick="printReport()"><i class="fa-solid fa-print me-1"></i>Print</button>
                                <button type="button" class="btn btn-outline-success" onclick="exportCSV()"><i class="fa-solid fa-download me-1"></i>Export CSV</button>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Summary Cards -->
                <div class="row mb-3" id="summaryCards">
                    <div class="col-md-3"><div class="card"><div class="card-body text-center"><h6 class="text-muted">Total Payments</h6><h3 id="totalPayments">0</h3></div></div></div>
                    <div class="col-md-3"><div class="card"><div class="card-body text-center"><h6 class="text-muted">Total Amount</h6><h3 id="totalAmount">Rs. 0</h3></div></div></div>
                    <div class="col-md-3"><div class="card"><div class="card-body text-center"><h6 class="text-muted">Total Paid</h6><h3 id="totalPaid">Rs. 0</h3></div></div></div>
                    <div class="col-md-3"><div class="card"><div class="card-body text-center"><h6 class="text-muted">Total Balance</h6><h3 id="totalBalance">Rs. 0</h3></div></div></div>
                </div>

                <!-- Filters -->
                <div class="card mb-3">
                    <div class="card-body">
                        <div class="row g-3">
                            <div class="col-md-3">
                                <label class="form-label fw-bold">From Date</label>
                                <input type="date" id="filterDateFrom" class="form-control" onchange="applyFilters()">
                            </div>
                            <div class="col-md-3">
                                <label class="form-label fw-bold">To Date</label>
                                <input type="date" id="filterDateTo" class="form-control" onchange="applyFilters()">
                            </div>
                            <div class="col-md-3">
                                <label class="form-label fw-bold">Payment Method</label>
                                <select id="filterMethod" class="form-select" onchange="applyFilters()">
                                    <option value="">All Methods</option>
                                </select>
                            </div>
                            <div class="col-md-3">
                                <label class="form-label fw-bold">Customer</label>
                                <select id="filterCustomer" class="form-select" onchange="applyFilters()">
                                    <option value="">All Customers</option>
                                </select>
                            </div>
                        </div>
                        <div class="row mt-3">
                            <div class="col text-end">
                                <button type="button" class="btn btn-secondary" onclick="clearFilters()">Clear Filters</button>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Data Table -->
                <div class="row m-2">
                    <div class="col-12">
                        <div class="card">
                            <div class="card-body">
                                <table class="modern-table">
                                    <thead>
                                        <tr>
                                            <th>#</th>
                                            <th>Bill No</th>
                                            <th>Appointment</th>
                                            <th>Customer</th>
                                            <th>Amount (Rs.)</th>
                                            <th>Paid (Rs.)</th>
                                            <th>Balance (Rs.)</th>
                                            <th>Method</th>
                                            <th>Date</th>
                                            <th>Action</th>
                                        </tr>
                                    </thead>
                                    <tbody id="tableBodyPayments" class="tablebody"></tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <div th:replace="~{footer :: footerFragment}"></div>
    <script src="/js/report_payments.js"></script>
</body>
</html>
