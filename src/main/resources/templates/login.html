<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Salon DEEN</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="/Resources/bootstrap-5.3.7/css/bootstrap.min.css">
    <!-- FontAwesome -->
    <link rel="stylesheet" href="/Resources/fontawesome-7.0.0/css/all.min.css">

    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .login-container {
            width: 100%;
            max-width: 420px;
        }

        .login-card {
            background: #ffffff;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.08);
            overflow: hidden;
        }

        .login-header {
            background: linear-gradient(135deg, #8a2be2 0%, #f093fb 100%);
            padding: 2rem;
            text-align: center;
        }

        .login-header .logo-icon {
            width: 56px;
            height: 56px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 16px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 1rem;
            font-size: 1.5rem;
            color: #ffffff;
        }

        .login-header h1 {
            font-family: 'Poppins', sans-serif;
            font-size: 1.75rem;
            font-weight: 800;
            color: #ffffff;
            margin: 0 0 0.25rem;
        }

        .login-header p {
            color: rgba(255, 255, 255, 0.85);
            font-size: 0.875rem;
            margin: 0;
        }

        .login-body {
            padding: 2rem;
        }

        .form-floating {
            margin-bottom: 1rem;
        }

        .form-floating .form-control {
            border: 1.5px solid #e2e8f0;
            border-radius: 10px;
            padding: 1rem 0.75rem;
            font-size: 0.9rem;
            height: auto;
        }

        .form-floating .form-control:focus {
            border-color: #8a2be2;
            box-shadow: 0 0 0 3px rgba(138, 43, 226, 0.12);
        }

        .form-floating label {
            font-size: 0.85rem;
            color: #64748b;
        }

        .btn-login {
            width: 100%;
            padding: 0.75rem;
            background: linear-gradient(135deg, #8a2be2 0%, #f093fb 100%);
            border: none;
            border-radius: 10px;
            color: #ffffff;
            font-family: 'Poppins', sans-serif;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn-login:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(138, 43, 226, 0.3);
            background: linear-gradient(135deg, #7b27d1 0%, #e07ef0 100%);
        }

        .alert {
            border-radius: 10px;
            font-size: 0.85rem;
            margin-bottom: 1rem;
        }

        .alert-danger {
            background-color: #fef2f2;
            border-color: #fecaca;
            color: #991b1b;
        }

        .alert-success {
            background-color: #f0fdf4;
            border-color: #bbf7d0;
            color: #166534;
        }

        .alert-warning {
            background-color: #fffbeb;
            border-color: #fde68a;
            color: #92400e;
        }
    </style>
</head>

<body>
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <div class="logo-icon">
                    <i class="fa-solid fa-scissors"></i>
                </div>
                <h1>Salon DEEN</h1>
                <p>Management System</p>
            </div>
            <div class="login-body">
                <!-- Error message -->
                <div class="alert alert-danger" th:if="${param.error}">
                    <i class="fa-solid fa-circle-exclamation me-1"></i>
                    Invalid username or password.
                </div>

                <!-- Logout message -->
                <div class="alert alert-success" th:if="${param.logout}">
                    <i class="fa-solid fa-circle-check me-1"></i>
                    You have been logged out successfully.
                </div>

                <!-- Session expired message -->
                <div class="alert alert-warning" th:if="${param.expired}">
                    <i class="fa-solid fa-clock me-1"></i>
                    Your session has expired. Please log in again.
                </div>

                <form th:action="@{/login}" method="post">
                    <div class="form-floating">
                        <input type="text" class="form-control" id="username" name="username"
                            placeholder="Username" required autofocus>
                        <label for="username"><i class="fa-solid fa-user me-1"></i> Username</label>
                    </div>

                    <div class="form-floating">
                        <input type="password" class="form-control" id="password" name="password"
                            placeholder="Password" required>
                        <label for="password"><i class="fa-solid fa-lock me-1"></i> Password</label>
                    </div>

                    <button type="submit" class="btn-login">
                        <i class="fa-solid fa-right-to-bracket me-1"></i> Sign In
                    </button>
                </form>
            </div>
        </div>
    </div>

    <script src="/Resources/bootstrap-5.3.7/js/bootstrap.bundle.min.js"></script>
</body>

</html>
