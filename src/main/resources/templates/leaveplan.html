<!DOCTYPE html>
<html lang="en" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head th:replace="~{header :: headerFragment}"></head>

<body>
    <div class="app-layout">
        <!-- Desktop Sidebar -->
        <aside class="sidebar d-none d-lg-flex" th:replace="~{layout :: sidebarFragment}"></aside>

        <!-- Mobile Offcanvas Sidebar -->
        <div th:replace="~{layout :: sidebarOffcanvasFragment}"></div>

        <!-- Main Content -->
        <div class="main-content">
            <!-- Top Bar -->
            <header th:replace="~{layout :: topbarFragment('Leave Plan Management')}"></header>

            <!-- Page Content -->
            <div class="content-wrapper">
                <!-- Page Title Card with Add Button -->
                <div class="card mb-3">
                    <div class="card-header title">
                        <div class="row align-items-center">
                            <div class="col text-start">
                                <h2 class="table-title">Leave Plan Management</h2>
                            </div>
                            <div class="col text-end header-actions">
                                <button type="button" class="btn my-custom-employee-button" data-bs-toggle="offcanvas"
                                    data-bs-target="#panelLeavePlanForm">
                                    <i class="fa-solid fa-plus"></i> Add New Leave Plan
                                </button>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="row m-2">
                    <div class="col-12">
                        <div class="card">
                            <div class="card-body">
                                <div class="table-responsive">
                                    <table id="tableMonthlyAvailablePlan" class="modern-table">
                                        <thead>
                                            <tr>
                                                <th>#</th>
                                                <th>EMP No</th>
                                                <th>Staff Member</th>
                                                <th>Month</th>
                                                <th>Year</th>
                                                <th>Available Employees</th>
                                                <th>Actions</th>
                                            </tr>
                                        </thead>
                                        <tbody id="tableBodyMonthlyAvailablePlan" class="tablebody">
                                            <!-- Data will be populated here dynamically -->
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- offcanvas panel area -->
                <div class="offcanvas offcanvas-end offcanvas-panel" id="panelLeavePlanForm" data-bs-backdrop="true">
                    <div class="offcanvas-header">
                        <h5 class="offcanvas-title">New Leave Plan</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="offcanvas"></button>
                    </div>

                    <div class="offcanvas-body">
                        <form id="formMonthlyAvailablePlan" onsubmit="return false;">

                            <h6 class="form-section-title"><i class="fa-solid fa-calendar-days me-2"></i>Leave Plan Details</h6>
                            <div class="row g-3">
                                <div class="col-12 col-md-5 col-lg-4 mb-3 mb-md-0">
                                    <label class="form-label" for="inputMonth"><i class="fa-regular fa-calendar me-1"></i>Month <span class="text-danger">*</span></label>
                                    <div class="input-group">
                                        <span class="input-group-text"><i class="fa-regular fa-calendar"></i></span>
                                        <input type="month" id="inputMonth" class="form-control input-element">
                                    </div>

                                    <div class="mt-3">
                                        <label class="form-label"><i class="fa-solid fa-user me-1"></i>Employee <span class="text-danger">*</span></label>
                                        <div class="input-group">
                                            <span class="input-group-text"><i class="fa-solid fa-magnifying-glass"></i></span>
                                            <input type="text" id="searchEmployee" class="form-control" placeholder="Search by name or code..." list="listEmployee">
                                            <datalist id="listEmployee"></datalist>
                                            <input type="hidden" id="selectEmployee">
                                        </div>
                                    </div>

                                    <div class="mt-3">
                                        <label class="form-label" for="selectLeaveType"><i class="fa-solid fa-plane me-1"></i>Leave Type <span class="text-danger">*</span></label>
                                        <select id="selectLeaveType" class="form-select input-element">
                                            <option value="" selected disabled>-- Select Leave Type --</option>
                                        </select>
                                    </div>

                                    <div class="card mt-3">
                                        <div class="card-body p-3">
                                            <h5 class="mb-2">Permanent Leave Days</h5>
                                            <div id="permanentLeaveDays">Sunday, Tuesday</div>
                                        </div>
                                    </div>
                                </div>

                                <div class="col-12 col-md-7 col-lg-8">
                                    <div class="table-responsive">
                                        <div class="card p-3">
                                            <div id="calendar" style="height:600px;"></div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </form>
                        <div class="panel-footer">
                            <button type="button" id="buttonClear" class="btn-clear" onclick="refreshMonthlyAvailablePlanForm()">Clear</button>
                            <button type="button" id="buttonUpdate" class="btn-update" style="display:none;" onclick="updateMonthlyAvailablePlanForm()">Update</button>
                            <button type="button" id="buttonSubmit" class="btn-submit" onclick="submitLeaveplanForm()">Submit</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div th:replace="~{footer :: footerFragment}"></div>
    <script src="/Resources/lib/fullcalendar-6.1.20/dist/index.global.min.js"></script>
    <script src="/js/leaveplan.js"></script>
</body>

</html>
